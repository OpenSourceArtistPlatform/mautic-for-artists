name: Bug Report
description: Report a bug with Mautic for Artists
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Run ./setup.sh
        2. Enter values...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g., Ubuntu 22.04, macOS 14, Windows 11

  - type: input
    id: docker-version
    attributes:
      label: Docker Version
      placeholder: e.g., Docker 24.0.7, Docker Compose v2.23.0

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant output from `docker compose logs`.
      render: shell
